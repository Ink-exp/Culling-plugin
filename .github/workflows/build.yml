name: Build Culling Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: n2m2/action-setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Compile Library
        run: |
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-28 ..
          make -j$(nproc)

      - name: Package Culling Plugin ZIP
        run: |
          mkdir -p output
          cp build/libculling_plugin.so output/
          cp manifest.json output/
          cd output && zip -r ../culling-plugin.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CullingPlugin-Release
          path: culling-plugin.zip

