name: Build Culling Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to create releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Compile Library
        run: |
          cmake -B build \
                -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-28
          cmake --build build --parallel

      - name: Package Culling Plugin ZIP
        run: |
          mkdir -p output
          cp build/libculling_plugin.so output/
          cp manifest.json output/
          cd output && zip -r ../culling-plugin.zip *

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CullingPlugin-Release
          path: culling-plugin.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: culling-plugin.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
